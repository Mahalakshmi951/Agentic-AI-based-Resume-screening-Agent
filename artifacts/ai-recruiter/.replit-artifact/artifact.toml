kind = "web"
previewPath = "/"
title = "AI Recruiter"
version = "1.0.0"
id = "artifacts/ai-recruiter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24295

[services.development]
run = "pnpm --filter @workspace/ai-recruiter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-recruiter", "run", "build" ]
publicDir = "artifacts/ai-recruiter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24295"
BASE_PATH = "/"
